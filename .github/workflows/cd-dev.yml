name: CD — Dev Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform apply dev
        run: |
          terraform -chdir=infra/envs/dev init
          terraform -chdir=infra/envs/dev apply -auto-approve

      - name: Resolve Terraform outputs
        id: buckets
        run: |
          echo "scripts_bucket=$(terraform -chdir=infra/envs/dev output -raw scripts_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "raw_bucket=$(terraform -chdir=infra/envs/dev output -raw raw_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "state_machine_arn=$(terraform -chdir=infra/envs/dev output -raw state_machine_arn)" >> "$GITHUB_OUTPUT"

      - name: Build and upload Glue wheel
        run: |
          cd glue
          pip install build
          python -m build --wheel
          aws s3 cp dist/shared-0.1.0-py3-none-any.whl \
            "s3://${{ steps.buckets.outputs.scripts_bucket }}/glue/shared/shared-0.1.0-py3-none-any.whl"
          aws s3 sync . "s3://${{ steps.buckets.outputs.scripts_bucket }}/glue/" \
            --exclude "*" --include "*.py" --delete
          cd ..

      - name: Post-deploy smoke test
        run: pytest tests/e2e -q -m smoke
        env:
          ENV: dev
          AWS_REGION: eu-west-1
          RAW_BUCKET: ${{ steps.buckets.outputs.raw_bucket }}
          STATE_MACHINE_ARN: ${{ steps.buckets.outputs.state_machine_arn }}
